<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MathMastery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <span class="logo-icon">∑</span>
                <span class="logo-text">MathMastery</span>
            </div>
            <div class="navbar-auth">
                <button class="btn-theme-toggle" id="themeToggle">🌙</button>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="floating-symbols">
            <span class="symbol">+</span>
            <span class="symbol">−</span>
            <span class="symbol">×</span>
            <span class="symbol">÷</span>
            <span class="symbol">π</span>
            <span class="symbol">√</span>
        </div>

        <div class="auth-container glass-effect">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Login to continue your learning journey</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    <span class="error-message" id="loginEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-input">
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword', 'loginToggleIcon')">
                            <span id="loginToggleIcon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="loginPasswordError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-large btn-full">Login</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </section>

    <!-- Demo Credentials Info -->
    <div class="demo-info glass-effect">
        <p><strong>Demo Account:</strong> Email: demo@mathmastery.com | Password: Demo123456</p>
    </div>

    <script src="js/script.js"></script>
</body>
</html>

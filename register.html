<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MathMastery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <span class="logo-icon">∑</span>
                <span class="logo-text">MathMastery</span>
            </div>
            <div class="navbar-auth">
                <button class="btn-theme-toggle" id="themeToggle">🌙</button>
            </div>
        </div>
    </nav>

    <!-- Register Section -->
    <section class="auth-section">
        <div class="floating-symbols">
            <span class="symbol">+</span>
            <span class="symbol">−</span>
            <span class="symbol">×</span>
            <span class="symbol">÷</span>
            <span class="symbol">π</span>
            <span class="symbol">√</span>
        </div>

        <div class="auth-container glass-effect">
            <div class="auth-header">
                <h1>Create Your Account</h1>
                <p>Join thousands of students mastering mathematics</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                    <span class="error-message" id="fullNameError"></span>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" placeholder="Minimum 8 characters" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', 'toggleIcon1')">
                            <span id="toggleIcon1">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-input">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', 'toggleIcon2')">
                            <span id="toggleIcon2">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-large btn-full">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </section>

    <!-- Success Modal -->
    <div id="successModal" class="modal hidden">
        <div class="modal-content glass-effect">
            <div class="modal-icon">✅</div>
            <h2>Registration Successful!</h2>
            <p>Welcome to MathMastery! Your account has been created.</p>
            <a href="login.html" class="btn btn-primary btn-large">Go to Login</a>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
